name: CI - Donation Worker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOTNET_VERSION: '10.0.x'
  DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/conexao-solidaria-donation-worker

jobs:
  build-and-publish:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restaurar dependências
        run: dotnet restore src/DonationWorker/DonationWorker.csproj

      - name: Build
        run: dotnet build src/DonationWorker/DonationWorker.csproj --no-restore --configuration Release

      - name: Publicar aplicação
        run: dotnet publish src/DonationWorker/DonationWorker.csproj --configuration Release --output ./publish

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.DOCKERHUB_REPO }}:latest
            ${{ env.DOCKERHUB_REPO }}:${{ github.sha }}